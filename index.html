<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Energy Drink Tracker 🔋</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #1a1a1a;
            --monster: #32cd32;
            --redbull: #0052cc;
            --hell: #ff0000;
            --text: #ffffff;
            --accent: #ccff00;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin: 20px 0; }
        h1 { color: var(--monster); text-transform: uppercase; font-size: 1.8rem; letter-spacing: 1px; }
        
        .stats-panel {
            background: var(--card);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #333;
            margin-bottom: 25px;
            position: sticky;
            top: 15px;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            min-width: 180px;
        }
        #count { color: var(--accent); }

        .category-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }
        
        h2 { 
            font-size: 1rem; 
            margin-bottom: 12px; 
            padding-left: 10px; 
            text-transform: uppercase;
            color: #888;
        }
        .m-line { border-left: 4px solid var(--monster); }
        .r-line { border-left: 4px solid var(--redbull); }
        .h-line { border-left: 4px solid var(--hell); }

        .checklist {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #262626;
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .item:active { background: #222; }
        .item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 18px;
            accent-color: var(--monster);
            cursor: pointer;
        }

        .checked { opacity: 0.3; background: #000 !important; }
        .checked span { text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="header">
        <h1>My Collection</h1>
    </div>

    <div class="stats-panel">
        Done: <span id="count">0</span> / <span id="total">0</span>
    </div>

    <div id="main-content" style="width: 100%; max-width: 500px;"></div>

    <script>
        const collection = {
            "Monster Ultra": [
                "Ultra Paradise", "Ultra Golden Pineapple", "Ultra Watermelon", 
                "Ultra Fantasy Ruby Red", "Ultra Rosa", "Ultra Peachy Keen", 
                "Ultra Violet", "Ultra Black", "Ultra Strawberry Dreams", 
                "Ultra White", "Ultra Fiesta Mango", "Ultra Blue Hawaiian", "Ultra Sunrise"
            ],
            "Monster Juice & Nitro": [
                "Bad Apple", "Viking Berry", "Aussie Lemonade", "Monarch", 
                "Khaotic", "Mango Loco", "Pipeline Punch", "Pacific Punch", 
                "Rio Punch", "Mixxd", "Nitro Super Dry", "Nitro Cosmic Peach"
            ],
            "Monster Classic & Collabs": [
                "Classic", "Classic Zero Sugar", "Classic Absolutely Zero", "Assault",
                "Reserve White Pineapple", "Rehab Peach Tea", "Rehab Lemon Tea", 
                "Lewis Hamilton", "Lando Norris", "Full Throttle", 
                "VR46", "VR46 Zero Sugar", "Killer Brew Loca Moca"
            ],
            "Red Bull Edition": [
                "Red Bull Classic", "Red (Watermelon)", "Ruby (Apricot & Strawberry)", 
                "Peach (White Peach)", "Apricot", "Winter (Pear Cinnamon)", 
                "Yellow (Tropical)", "Lime Green (Lime)", "Green (Cactus Fruit)", 
                "Ice (Vanilla Ice Berry)", "Sea Blue (Juneberry)", "Blue (Blueberry)", 
                "Lilac (Acai Berry)", "Purple (Açaí)", "Peach (Variant 2)", 
                "Peach (Variant 3)", "Peach (Variant 4)", "Peach Sugarfree", 
                "Pink Sugarfree (Forest Fruits)", "White (Coconut & Berry)", 
                "Spring (Sugarfree)", "Zero", "Sugarfree"
            ],
            "Hell Energy": [
                "Hell Classic", "Hell Strong Apple", "Hell Strong Red Grape",
                "Hell Zero Strawberry", "Hell Summer Cool (Sun Smiles)",
                "Hell Summer Cool (Night Surf)", "Hell Ice Cool"
            ]
        };

        const container = document.getElementById('main-content');
        let totalItems = 0;

        for (const [category, items] of Object.entries(collection)) {
            const catDiv = document.createElement('div');
            catDiv.className = 'category-container';
            
            let borderClass = 'm-line';
            if(category.includes('Red Bull')) borderClass = 'r-line';
            if(category.includes('Hell')) borderClass = 'h-line';

            catDiv.innerHTML = `<h2 class="${borderClass}">${category}</h2>`;
            const listDiv = document.createElement('div');
            listDiv.className = 'checklist';

            items.forEach(name => {
                totalItems++;
                // Створюємо унікальний ID, включаючи категорію, щоб уникнути дублів (наприклад, "Classic")
                const id = (category + "-" + name).replace(/\s+/g, '-').toLowerCase();
                const isChecked = localStorage.getItem(id) === 'true';

                const itemDiv = document.createElement('div');
                itemDiv.className = `item ${isChecked ? 'checked' : ''}`;
                itemDiv.innerHTML = `
                    <input type="checkbox" id="${id}" ${isChecked ? 'checked' : ''}>
                    <span>${name}</span>
                `;

                itemDiv.onclick = (e) => {
                    const cb = itemDiv.querySelector('input');
                    // Якщо клікнули не по самому чекбоксу, перемикаємо його вручну
                    if(e.target !== cb) {
                        cb.checked = !cb.checked;
                    }
                    // Оновлюємо стан
                    localStorage.setItem(id, cb.checked);
                    itemDiv.classList.toggle('checked', cb.checked);
                    updateStats();
                };

                listDiv.appendChild(itemDiv);
            });

            catDiv.appendChild(listDiv);
            container.appendChild(catDiv);
        }

        function updateStats() {
            const checked = document.querySelectorAll('input:checked').length;
            document.getElementById('count').innerText = checked;
            document.getElementById('total').innerText = totalItems;
        }

        updateStats();
    </script>
</body>
</html>
